<template>
    <div class="slds-grid">
        <template if:false={isReview}>
            <div class="slds-col slds-size_9-of-12">
                <lightning-spinner alternative-text="Loading" size="medium" if:true={isLoading}></lightning-spinner>
                <lightning-card title="Configure Wi-Fi Advanced">

                    <!-- STEP HEADER -->
                    <div class="slds-p-around_medium slds-text-heading_medium">
                        Step {currentStep} of {totalSteps}: {currentCategory}
                    </div>

                    <!-- PROGRESS BAR -->
                    <div class="progress-container">
                        <template for:each={steps} for:item="step">
                            <div key={step.number} class={step.cssClass}></div>
                        </template>
                    </div>

                    <!-- CATEGORY -->
                    <template if:true={currentCategory}>
                        <div class="slds-p-horizontal_medium slds-text-title_bold">
                            {currentCategory}
                        </div>
                    </template>

                    <!-- PRODUCTS -->
                    <!-- <template if:true={hasProducts}>
                    <template for:each={products} for:item="prod">
                        <div key={prod.productId}
                            class="slds-box slds-m-around_small slds-grid slds-wrap slds-align_absolute-center">

                                <div class="slds-text-heading_small slds-text-title_bold">{prod.productName}</div>

                                <div class="slds-m-top_x-small"><b>Price:</b> $ {prod.price}</div>

                                </template>
                                <template if:true={prod.displayUrl}>
                                    <div class="slds-m-top_x-small">
                                        <a href={prod.displayUrl} target="_blank">View Product Page</a>
                                    </div>
                                </template>
                                <div class="slds-m-top_x-small">
                                    <lightning-input type="checkbox" label="Select for Quote" data-id={prod.productId}
                                        checked={prod.selected} onchange={handleSelectCheckbox}>
                                    </lightning-input>
                                </div>
                            </div>

                            <div class="slds-col slds-size_3-of-12 slds-text-align_right">
                                <lightning-button label="Configure" variant="brand" data-id={prod.productId}
                                    onclick={handleConfigure}>

                        </div>

                </template> -->
                    <template if:true={hasProducts}>
                        <div class="product-container">
                            <template for:each={products} for:item="prod">
                                <div key={prod.productId} class={prod.cardClass} data-id={prod.productId}
                                    onclick={handleSelectCheckbox}>

                                    <div class="slds-grid slds-wrap slds-grid_vertical-align-center">

                                        <!-- LEFT CONTENT -->
                                        <div class="slds-col slds-size_9-of-12">

                                            <!-- Title Row -->
                                            <div class="title-row">

                                                <input type="radio"
                                                    data-id={prod.productId}
                                                    checked={prod.selected}
                                                    class="radio-btn"
                                                />

                                                <div class="product-title">
                                                    {prod.productName}
                                                </div>
                                            </div>

                                            <div class="description">
                                                {prod.description}
                                            </div>

                                            <div class="price-text">
                                                $ {prod.price}
                                            </div>

                                            <template if:true={prod.sellingModel}>
                                                <div class="meta-text">
                                                    <b>Selling Model:</b> {prod.sellingModel}
                                                </div>
                                            </template>

                                            <!-- <template if:true={prod.displayUrl}>
                                            <div class="meta-text">
                                                <a href={prod.displayUrl} target="_blank">
                                                    View Product Page
                                                </a>
                                            </div>
                                        </template> -->

                                        </div>

                                        <!-- RIGHT SIDE -->
                                        <div class="slds-col slds-size_3-of-12 slds-text-align_right">
                                            <lightning-button label="Configure" variant="brand-outline"
                                                data-id={prod.productId} onclick={handleConfigure}>
                                            </lightning-button>
                                        </div>

                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- NO PRODUCTS -->
                    <template if:false={hasProducts}>
                        <div class="slds-p-around_medium slds-text-align_center">
                            No products available
                        </div>
                    </template>

                    <!-- NAVIGATION -->
                    <div class="slds-p-around_medium slds-text-align_center">
                        <template if:false={isFirstStep}>
                            <lightning-button label="Back" class="slds-m-right_small" onclick={handleBack}>
                            </lightning-button>
                        </template>

                        <template if:false={isLastStep}>
                            <lightning-button label="Next" variant="brand" onclick={handleNext}></lightning-button>
                        </template>

                        <template if:true={isLastStep}>
                            <lightning-button label="Review" variant="brand" onclick={showReview}></lightning-button>
                        </template>
                    </div>

                </lightning-card>
                <!-- FLOW MODAL -->
                <template if:true={showFlow}>
                    <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_large flow-modal">
                        <div class="slds-modal__container flow-modal__container">

                            <!-- HEADER -->
                            <header class="slds-modal__header">
                                <lightning-button-icon icon-name="utility:close" class="slds-modal__close"
                                    onclick={closeFlow}>
                                </lightning-button-icon>

                                <h2 class="slds-text-heading_medium">
                                    Product Configuration
                                </h2>
                            </header>

                            <!-- BODY -->
                            <div class="slds-modal__content slds-p-around_medium flow-modal__body">

                                <lightning-flow flow-api-name="Custom_Product_Configurator_Flow"
                                    flow-input-variables={flowInputVariables}
                                    onstatuschange={handleFlowStatusChange}
                                    ondmcaptureback={handleDmCaptureBack}>
                                </lightning-flow>

                            </div>

                        </div>
                    </section>

                    <div class="slds-backdrop slds-backdrop_open"></div>
                </template>

                <!-- ── Captured Data Manager Variables Panel ─────────────── -->
                <template if:true={showCapturedData}>
                    <lightning-card title="Captured Data Manager Variables" icon-name="utility:connected_apps"
                        class="slds-m-top_medium">
                        <div class="slds-p-around_small">
                            <p class="slds-text-body_small slds-m-bottom_small">
                                These are the output variables returned by the flow after it finished.
                                If the list is empty, ensure the relevant flow variables have
                                <code>isOutput=true</code>.
                            </p>

                            <template if:true={capturedDmRows}>
                                <template for:each={capturedDmRows} for:item="row">
                                    <div key={row.key} class="dm-capture-row">
                                        <div class="dm-capture-key">{row.key}</div>
                                        <pre class="dm-capture-value">{row.value}</pre>
                                    </div>
                                </template>
                            </template>

                            <template if:false={capturedDmRows.length}>
                                <p class="slds-text-color_weak">No output variables captured from the flow.</p>
                            </template>
                        </div>
                    </lightning-card>
                </template>
            </div>
            <div class="slds-col slds-size_3-of-12">
                <c-managed-wi-fi-advanced-flow-cart cart-items={cart} selected-location={selectedLocationJSON}>
                </c-managed-wi-fi-advanced-flow-cart>
            </div>
        </template>
    </div>
    <template if:true={isReview}>
        <c-flow-order-summary input-json={cart}>
        </c-flow-order-summary>
    </template>
</template>
