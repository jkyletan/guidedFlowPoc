<template>
    <template if:true={isLoading}>
        <lightning-spinner
            alternative-text="Loading..."
            size="large">
        </lightning-spinner>
    </template>
    <footer class="footer-bar">
        <div class="footer-content">
            <lightning-button
                label="Finish"
                variant="brand"
                onclick={handleFinish}
                class="finish-btn">
            </lightning-button>
        </div>
    </footer>
</template>
